name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --all

  swift:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: swift build --package-path macos/CCCodexProxy

